name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: version
        run: |
          NEW_VERSION=$(jq -r '.version // empty' package.json)
          if [ -z "$NEW_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OLD_VERSION=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version // empty' 2>/dev/null || echo "")

          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get previous tag
        id: prev_tag
        if: steps.version.outputs.changed == 'true'
        run: |
          PREV=$(git tag --sort=-version:refname | head -1)
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Build changelog input
        if: steps.version.outputs.changed == 'true'
        run: |
          PREV="${{ steps.prev_tag.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          {
            echo "Versão: v${VERSION}"
            echo ""
            echo "=== COMMITS ==="
            if [ -z "$PREV" ]; then
              git log --format="- %s (%h by %an)"
            else
              git log "${PREV}..HEAD" --format="- %s (%h by %an)"
            fi
            echo ""
            echo "=== DIFF (sem arquivos de lock e node_modules) ==="
            if [ -z "$PREV" ]; then
              git diff HEAD~5..HEAD -- . ':!bun.lock' ':!node_modules' 2>/dev/null | head -c 40000
            else
              git diff "${PREV}..HEAD" -- . ':!bun.lock' ':!node_modules' 2>/dev/null | head -c 40000
            fi
          } > /tmp/changes.txt

      - name: Install Claude Code
        if: steps.version.outputs.changed == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate release notes with Claude
        id: notes
        if: steps.version.outputs.changed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        run: |
          cat > /tmp/prompt.txt << 'PROMPT_EOF'
          Você é um assistente especializado em criar release notes de software. Analise os commits e o diff abaixo e gere release notes em português para a versão indicada. Organize em categorias com emojis (ex: 🚀 Novidades, 🐛 Correções, ⚡ Melhorias, 🔧 Mudanças internas). Use markdown com listas. Seja informativo e conciso. Ignore menções a bun.lock e node_modules.

          PROMPT_EOF

          cat /tmp/changes.txt >> /tmp/prompt.txt

          GENERATED=$(cat /tmp/prompt.txt | claude -p 2>/dev/null) || GENERATED=""

          if [ -z "$GENERATED" ]; then
            GENERATED="Release automático - veja os commits para detalhes."
          fi

          {
            echo "body<<NOTES_DELIM"
            echo "$GENERATED"
            echo "NOTES_DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true
          token: ${{ secrets.PAT }}
